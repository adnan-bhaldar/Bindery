<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Bindery — Professional image to PDF converter. Works entirely offline." />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bindery" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Bindery — Image to PDF" />
  <meta property="og:description" content="Professional image to PDF converter. Privacy-first, works offline." />

  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>Bindery</title>

  <!-- Prevent FOUC by applying theme immediately -->
  <script>
    (function () {
      try {
        const stored = localStorage.getItem('bindery:theme')
        const parsed = stored ? JSON.parse(stored) : null
        const theme = parsed?.state?.theme ?? 'dark'
        const resolved =
          theme === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
            : theme
        document.documentElement.classList.add('theme-' + resolved)
      } catch {
        document.documentElement.classList.add('theme-dark')
      }
    })()
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
